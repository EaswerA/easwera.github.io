<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            overflow-x: hidden;
            background-color: #d7e3f4;
        }

        body {
            margin: 0;
            font-family: 'Press Start 2P', monospace;
            background: repeating-linear-gradient(45deg,
                    #d7e3f4,
                    #d7e3f4 10px,
                    #9fb5cc 10px,
                    #9fb5cc 20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .gameboy {
            background: #d32f2f;
            border: 8px solid #111;
            border-radius: 16px;
            padding: 20px;
            width: 95%;
            max-width: 500px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            margin-top: 40px;
        }

        .screen {
            background: #f1e8c5;
            border: 6px solid #111;
            padding: 20px;
            box-shadow: inset 0 0 0 4px #fff;
            text-align: center;
        }

        h1 {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .trainer {
            width: 64px;
            height: 64px;
            image-rendering: pixelated;
            margin: 0 auto 15px;
        }

        .textbox {
            border: 3px solid #111;
            padding: 10px;
            background: #fff;
            margin-bottom: 15px;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        nav a {
            padding: 6px 10px;
            background: #fff;
            border: 2px solid #111;
            color: #000;
            text-decoration: none;
            font-size: 10px;
            transition: all 0.2s ease;
        }

        nav a:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }

        .footer-bar {
            background: #f1e8c5;
            border: 3px solid #111;
            display: inline-block;
            padding: 8px 16px;
            box-shadow: 4px 4px #333;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            text-align: center;
        }

        .footer-bar a {
            color: #000;
            text-decoration: none;
            margin: 0 10px;
            transition: all 0.2s ease;
        }

        .footer-bar a:hover {
            color: #d32f2f;
            transform: scale(1.05);
        }

        .now-playing-bar {
            background: #111;
            color: #f1e8c5;
            border: 3px solid #111;
            box-shadow: 4px 4px #333;
            padding: 8px 14px;
            font-size: 10px;
            text-align: center;
            max-width: 520px;
        }

        footer {
            margin: 40px auto 20px;
            width: 95%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        @media (max-width: 500px) {
            .screen {
                padding: 10px;
            }

            .now-playing-bar {
                font-size: 8px;
                padding: 8px 10px;
            }
        }

        .theme-toggle {
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 2000;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            background: #fff8dc;
            color: #111;
            border: 3px solid #111;
            box-shadow: 3px 3px #333;
            padding: 8px 10px;
            cursor: pointer;
        }

        .theme-toggle:hover {
            transform: translateY(-1px);
        }

        body.dark-mode {
            background: repeating-linear-gradient(45deg, #0f172a, #0f172a 10px, #1e293b 10px, #1e293b 20px);
            color: #e5e7eb;
        }

        body.dark-mode .gameboy {
            background: #7f1d1d;
            border-color: #020617;
        }

        body.dark-mode .screen,
        body.dark-mode .textbox,
        body.dark-mode nav a,
        body.dark-mode .footer-bar {
            background: #1f2937;
            color: #e5e7eb;
            border-color: #334155;
            box-shadow: 4px 4px #020617;
        }

        body.dark-mode .footer-bar a {
            color: #e5e7eb;
        }

        body.dark-mode nav a:hover,
        body.dark-mode .footer-bar a:hover {
            background: #334155;
            color: #fca5a5;
        }

        body.dark-mode .now-playing-bar {
            background: #0b1220;
            color: #e5e7eb;
            border-color: #334155;
            box-shadow: 4px 4px #020617;
        }

        body.dark-mode .theme-toggle {
            background: #111827;
            color: #e5e7eb;
            border-color: #475569;
            box-shadow: 3px 3px #020617;
        }
    </style>
</head>

<body>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">DARK MODE</button>

    <div class="gameboy">
        <div class="screen">
            <h1>WASSSUP! I'm Easwer</h1>
            <a href="index.html"><img class="trainer" src="image.webp" alt="Trainer Sprite"></a>
            <div class="textbox">
                Welcome to my personal website!
            </div>
            <nav>
                <a href="about.html">ABOUT</a>
                <a href="projects.html">PROJECTS</a>
                <a href="blog.html">BLOGDEX</a>
                <a href="contact.html">CONTACT</a>
            </nav>
        </div>
    </div>

    <footer>
        <div class="footer-bar">
            <a href="https://amrita.town">amrita.town</a>
            <a href="https://amrita.town/prev"> prev</a>
            <a href="https://amrita.town/random"> random</a>
            <a href="https://amrita.town/next">next </a>
        </div>
        <div class="now-playing-bar">
            <span id="now-playing-global">🎵 Loading last played...</span>
        </div>
    </footer>

    <script>
        const username = "easw3r";
        const apiKey = "b8ceb8a6de64edcbba90e86730f0efef";

        async function fetchNowPlayingGlobal() {
            const nowPlayingEl = document.getElementById("now-playing-global");
            const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${username}&api_key=${apiKey}&format=json&limit=1`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                const track = data.recenttracks.track[0];
                const song = `${track.name} - ${track.artist["#text"]}`;
                const nowPlaying = track["@attr"]?.nowplaying === "true"
                    ? `🎵 Now Playing: "${song}"`
                    : `🎵 Last Played: "${song}"`;

                nowPlayingEl.textContent = nowPlaying;
            } catch (err) {
                nowPlayingEl.textContent = "🎵 Unable to fetch song";
            }
        }

        fetchNowPlayingGlobal();
    </script>

    <script>
        (function () {
            const themeKey = "site-theme";
            const toggle = document.getElementById("theme-toggle");

            function setToggleLabel(theme) {
                toggle.textContent = theme === "dark" ? "LIGHT MODE" : "DARK MODE";
            }

            function applyTheme(theme) {
                document.body.classList.toggle("dark-mode", theme === "dark");
                setToggleLabel(theme);
            }

            const savedTheme = localStorage.getItem(themeKey);
            const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
            const initialTheme = savedTheme || (prefersDark ? "dark" : "light");
            applyTheme(initialTheme);

            toggle.addEventListener("click", function () {
                const nextTheme = document.body.classList.contains("dark-mode") ? "light" : "dark";
                localStorage.setItem(themeKey, nextTheme);
                applyTheme(nextTheme);
            });
        })();
    </script>
</body>

</html>
